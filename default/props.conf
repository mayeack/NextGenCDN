[cdn:edge:access]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
NO_BINARY_CHECK = true
TRUNCATE = 999999
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30
TZ = UTC
category = CDN
description = CDN edge node access logs with cache status and response metrics

LOOKUP-edge_location = cdn_edge_locations edge_location OUTPUT region country capacity_gbps
LOOKUP-pop_capacity = cdn_pop_capacity pop OUTPUT max_capacity_gbps current_load_gbps

